name: Zizmor — workflow lint

# zizmor audits GitHub Actions workflow files for security smells:
# unpinned actions, missing `permissions:` blocks, ${{ }} injections
# in `run:` steps, etc. Runs on every PR that touches
# .github/workflows/, gates merges on it.
#
# https://github.com/zizmorcore/zizmor

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'

permissions: {}

concurrency:
  group: zizmor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Workflow audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b572f7b1a1c2d41efaab43d504f68d215c3cd727 # v0.5.4
        with:
          # Fail the job on any High or Critical finding. Mediums emit
          # SARIF to the Security tab but don't block the PR.
          advanced-security: true
