name: OSSF Scorecard

# Open Source Security Foundation (OSSF) Scorecard — measures the repo
# against a set of supply-chain security heuristics: branch protection,
# signed commits, pinned dependencies, dangerous workflow patterns,
# CI/CD provenance, etc. Results land in the Security tab and (when
# `publish_results: true`) on the public Scorecard registry.
#
# https://github.com/ossf/scorecard

on:
  branch_protection_rule:
  schedule:
    # Weekly. Same Monday slot as other supply-chain workflows.
    - cron: '0 7 * * 1'
  push:
    branches: [main]

permissions: {}

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required for ossf/scorecard-action.
      security-events: write
      id-token: write
      # contents: read is implied; the action reads the repo to audit it.
      contents: read
      actions: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results uploads the score to the public registry so
          # the badge in the README stays current. Safe for public repos.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7

      - name: Upload to Security tab
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: results.sarif
