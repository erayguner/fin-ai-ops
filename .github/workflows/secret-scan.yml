name: Secret scan

# Per opensource.guide and OSSF Scorecard, every public repo should
# have a secret-scanning step on every push and PR. GitHub's native
# secret scanning catches known-pattern tokens; gitleaks catches a
# broader set including custom patterns we configure in .gitleaks.toml
# (if present) and any future regex we add.
#
# Runs alongside (not instead of) the pre-commit `gitleaks` hook so
# we get coverage on every push even when contributors skip the hook.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0  # gitleaks needs full history
          persist-credentials: false

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for organisation-billed
          # accounts; personal public repos are free. Add it as a
          # repository secret if you upgrade.
